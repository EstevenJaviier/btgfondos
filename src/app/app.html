<div class="min-h-screen bg-gray-50 flex flex-col font-sans">
  <header class="bg-white border-b border-gray-100 shadow-sm sticky top-0 z-50">
    <div class="container mx-auto px-6 h-16 flex items-center justify-between">
      <div class="flex items-center space-x-2">
        <div
          class="w-8 h-8 rounded-lg bg-gradient-to-br from-green-500 to-green-700 flex items-center justify-center shadow-md"
        >
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"
            ></path>
          </svg>
        </div>
        <span class="text-xl font-black text-gray-900 tracking-tight"
          ><span class="text-green-600">Fondos</span></span
        >
      </div>

      <div class="flex items-center gap-3">
        <div class="hidden sm:block text-right">
          <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Saldo</p>
          <p class="text-sm font-black text-green-600 leading-tight">{{ balance() | copCurrency }}</p>
        </div>

        <nav class="flex space-x-1">
          <a
            routerLink="/funds"
            routerLinkActive="bg-green-50 text-green-700 text-green-700 font-bold font-bold"
            [routerLinkActiveOptions]="{ exact: false }"
            class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:text-gray-900 transition-colors"
          >
            Fondos
          </a>
          <a
            routerLink="/transactions"
            routerLinkActive="bg-green-50 text-green-700 font-bold"
            class="px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:text-gray-900 transition-colors"
          >
            Transacciones
          </a>
        </nav>
      </div>
    </div>
  </header>

  <main class="flex-grow lg:py-4 lg:px-4 py-4 px-1">
    <router-outlet></router-outlet>
  </main>

  <footer class="bg-white border-t border-gray-100 py-6 mt-auto">
    <div class="container mx-auto px-6 text-center text-sm text-gray-500">
      <p>&copy; 2026 Prueba Técnica Frontend Fondos.</p>
    </div>
  </footer>
</div>

<app-notification-container />
