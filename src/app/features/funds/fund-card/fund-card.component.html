<div
  class="bg-white rounded-xl shadow border border-gray-100 p-6 flex flex-col h-full transition-transform hover:shadow-lg duration-300"
>
  <div class="flex justify-between items-start mb-4">
    <div>
      <span
        class="inline-block px-3 py-1 bg-green-100 text-green-800 text-xs font-semibold rounded-full mb-2"
      >
        {{ fund.category }}
      </span>
      <h3 class="text-lg font-bold text-gray-800 leading-tight">{{ fund.name }}</h3>
    </div>
  </div>

  <div class="mt-auto pt-4 border-t border-gray-100">
    <p class="text-sm text-gray-500 mb-1">Monto mínimo</p>
    <p class="text-xl font-bold text-gray-900 mb-4">{{ fund.minimumAmount | copCurrency }}</p>

    <button
      (click)="onSubscribe()"
      class="w-full bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700 text-white font-medium py-2 px-4 rounded-lg shadow transition-colors focus:ring-4 focus:ring-green-300 focus:outline-none"
    >
      Suscribirse
    </button>
  </div>
</div>
